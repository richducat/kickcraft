<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#d4ff00" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <title>KickCraft</title>

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: #0b0b0b;
      color: #fff;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11, 11, 11, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #d4ff00;
      box-shadow: 0 0 18px rgba(212, 255, 0, 0.4);
    }

    .btn {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
    }

    .btn.primary {
      background: #d4ff00;
      color: #000;
      border-color: rgba(212, 255, 0, 0.5);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 920px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    .title {
      font-size: 18px;
      font-weight: 900;
    }

    .sub {
      color: rgba(255, 255, 255, 0.7);
      margin-top: 6px;
      line-height: 1.4;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 10px;
    }

    /* "SPA" player */
    .player {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
      display: none;
      flex-direction: column;
    }

    .playerbar {
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    iframe {
      border: 0;
      width: 100%;
      flex: 1;
      background: #000;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span>KickCraft</div>
    <button class="btn" id="installBtn" style="display:none;">Install</button>
  </div>

  <div class="wrap">
    <div class="grid">
      <div class="card">
        <div class="title">FC Mobile 26</div>
        <div class="sub">Premium mobile 3D prototype. Volt Green aesthetics, glassmorphism, and high-speed arcade
          mechanics.</div>
        <div class="row">
          <button class="btn primary" onclick="openGame('./web/fc-street/?quality=high')">Play Beta</button>
        </div>
        <div class="hint">Includes 4v4 Match + Humanoid Animations.</div>
      </div>

    </div>

    <div class="hint" style="margin-top:14px;">This is a PWA “app shell” so it behaves like an installable app while we
      polish toward App Store quality.</div>
  </div>

  <div class="player" id="player">
    <div class="playerbar">
      <div style="font-weight:900;">KickCraft</div>
      <button class="btn" onclick="closeGame()">Back</button>
    </div>
    <iframe id="frame" src="about:blank" allow="fullscreen; gamepad; autoplay" referrerpolicy="no-referrer"></iframe>
  </div>

  <script>
    // SPA-style app shell.
    // NOTE: iOS Safari + in-app browsers can be flaky with WebGL inside iframes.
    // On mobile, open the game directly (full page) for maximum compatibility.
    function isMobile() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');
    }
    function openGame(path) {
      if (isMobile()) {
        window.location.href = path;
        return;
      }
      document.getElementById('player').style.display = 'flex';
      document.getElementById('frame').src = path;
    }
    function closeGame() {
      document.getElementById('frame').src = 'about:blank';
      document.getElementById('player').style.display = 'none';
    }

    // PWA install prompt (Android/Chrome)
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });

    // Register service worker only on GitHub Pages.
    // On Vercel, proactively clear old registrations so stale app shells cannot persist.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        const onGithubPages = /\.github\.io$/i.test(location.hostname);
        if (onGithubPages) {
          try {
            const reg = await navigator.serviceWorker.register('./sw.js');
            if (reg && reg.update) reg.update();
          } catch (e) { }
          return;
        }
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        } catch (e) { }
      });
    }
  </script>
</body>

</html>
